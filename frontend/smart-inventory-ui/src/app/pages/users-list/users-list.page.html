<section class="page">
  <app-page-header title="Users" subtitle="Manage system accounts and roles">
    <ng-container pageActions>
      <button mat-flat-button color="primary" type="button" (click)="onAddUser()">
        <mat-icon>person_add</mat-icon>
        Add user
      </button>
    </ng-container>
  </app-page-header>

  <div class="page__toolbar">
    <app-search-field
      label="Search by username"
      placeholder="e.g. admin"
      [control]="searchControl"
    />
  </div>

  @if (error()) {
    <app-error-state
      title="Failed to load users"
      [message]="error()!"
      (retry)="loadUsers()"
    />
  } @else {
    <app-paginated-table-shell
      [loading]="loading()"
      [totalCount]="totalCount()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [columnCount]="displayedColumns.length"
      paginatorLabel="Users pagination"
      (pageChange)="onPageChange($event)"
    >
      <table
        mat-table
        [dataSource]="users()"
        class="users-table"
        aria-label="Users list"
      >
        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef>Username</th>
          <td mat-cell *matCellDef="let user">
            {{ user.username }}
            @if (isCurrentUser(user)) {
              <span class="users-table__you-badge">You</span>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let user">
            <span class="role-badge" [class.role-badge--admin]="user.role === 'Admin'">
              {{ user.role }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
          <td mat-cell *matCellDef="let user" class="actions-cell">
            <button
              mat-icon-button
              type="button"
              matTooltip="Edit user"
              (click)="onEditUser(user)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              color="warn"
              [matTooltip]="isCurrentUser(user) ? 'Delete your account' : 'Delete user'"
              (click)="onDeleteUser(user)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell users-table__empty" [attr.colspan]="displayedColumns.length">
            @if (!loading()) {
              No users found.
            }
          </td>
        </tr>
      </table>
    </app-paginated-table-shell>
  }
</section>
