<section class="warehouses page">
  <app-page-header
    title="Warehouses"
    subtitle="Storage locations across your organization"
  />

  @if (error()) {
    <app-error-state
      title="Failed to load warehouses"
      [message]="error()!"
      (retry)="reload()"
    />
  } @else {
    <mat-card class="warehouses__panel">
      <mat-card-content>
        @if (loading()) {
          <app-table-skeleton [rows]="5" [columns]="2" />
        } @else {
          <table mat-table [dataSource]="warehouses()" class="warehouses__table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let row">{{ row.name }}</td>
            </ng-container>
            <ng-container matColumnDef="location">
              <th mat-header-cell *matHeaderCellDef>Location</th>
              <td mat-cell *matCellDef="let row">{{ row.location }}</td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell warehouses__empty" [attr.colspan]="displayedColumns.length">
                No warehouses found.
              </td>
            </tr>
          </table>
        }
      </mat-card-content>
    </mat-card>
  }
</section>
