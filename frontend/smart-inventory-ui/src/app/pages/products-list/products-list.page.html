<section class="page">
  <app-page-header title="Products" subtitle="Manage your product catalog">
    @if (isAdmin()) {
      <ng-container pageActions>
        <app-stock-action-buttons (stockIn)="onStockIn()" (stockOut)="onStockOut()" />
        <button mat-flat-button color="primary" type="button" (click)="onAddProduct()">
          <mat-icon>add</mat-icon>
          Add product
        </button>
      </ng-container>
    }
  </app-page-header>

  <div class="page__toolbar">
    <app-search-field
      label="Search by name"
      placeholder="e.g. Laptop"
      [control]="searchControl"
    />
    @if (!isAdmin()) {
      <span class="page__readonly-hint">
        <mat-icon>visibility</mat-icon>
        View only
      </span>
    }
  </div>

  @if (error()) {
    <app-error-state
      title="Failed to load products"
      [message]="error()!"
      (retry)="loadProducts()"
    />
  } @else {
    <app-paginated-table-shell
      [loading]="loading()"
      [totalCount]="totalCount()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [columnCount]="displayedColumns().length"
      paginatorLabel="Products pagination"
      (pageChange)="onPageChange($event)"
    >
      <table
        mat-table
        [dataSource]="products()"
        class="products-table"
        aria-label="Products list"
      >
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let product">{{ product.name }}</td>
        </ng-container>

        <ng-container matColumnDef="sku">
          <th mat-header-cell *matHeaderCellDef>SKU</th>
          <td mat-cell *matCellDef="let product">{{ product.sku }}</td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Price</th>
          <td mat-cell *matCellDef="let product">{{ formatPrice(product.price) }}</td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Quantity</th>
          <td mat-cell *matCellDef="let product">
            <span
              class="quantity-badge"
              [class.quantity-badge--low]="product.quantity <= 10"
            >
              {{ product.quantity }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="warehouseName">
          <th mat-header-cell *matHeaderCellDef>Warehouse</th>
          <td mat-cell *matCellDef="let product">{{ product.warehouseName ?? '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
          <td mat-cell *matCellDef="let product" class="actions-cell">
            <button
              mat-icon-button
              type="button"
              matTooltip="Stock in"
              (click)="onStockIn(product)"
            >
              <mat-icon>add_circle_outline</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              matTooltip="Stock out"
              (click)="onStockOut(product)"
            >
              <mat-icon>remove_circle_outline</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              matTooltip="Edit product"
              (click)="onEditProduct(product)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              color="warn"
              matTooltip="Delete product"
              (click)="onDeleteProduct(product)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell products-table__empty" [attr.colspan]="displayedColumns().length">
            @if (!loading()) {
              No products found.
            }
          </td>
        </tr>
      </table>
    </app-paginated-table-shell>
  }
</section>
