<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" opened class="layout-sidenav">
    <div class="layout-brand">{{ appName }}</div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/products" routerLinkActive="active">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Products</span>
      </a>
      <a mat-list-item routerLink="/inventory/history" routerLinkActive="active">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>Inventory History</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="layout-toolbar">
      <span class="toolbar-spacer"></span>
      @if (auth.currentUser(); as user) {
        <span class="user-email">{{ user.email }}</span>
      }
      <button
        mat-icon-button
        type="button"
        (click)="themeService.toggle()"
        aria-label="Toggle theme"
      >
        <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-icon-button type="button" [matMenuTriggerFor]="userMenu" aria-label="User menu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item type="button" (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign out</span>
        </button>
      </mat-menu>
    </mat-toolbar>
    <main class="layout-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
