<mat-sidenav-container
  class="main-layout"
  [class.main-layout--collapsed]="sidebarCollapsed()"
  autosize
>
  <mat-sidenav
    #drawer
    class="main-layout__sidenav"
    [mode]="sidenavMode()"
    [opened]="sidenavMode() === 'side'"
    [disableClose]="false"
  >
    <app-sidebar
      [collapsed]="sidebarCollapsed() && !isHandset()"
      (navigate)="closeSidenavOnMobile()"
      (toggleCollapse)="toggleSidebarCollapse()"
    />
  </mat-sidenav>

  <mat-sidenav-content class="main-layout__content">
    <app-navbar
      [pageTitle]="pageTitle()"
      [showMenuButton]="showMenuButton() || !isHandset()"
      (menuToggle)="toggleSidenav()"
    />
    <main class="main-layout__page">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
