# Optional: use root docker-compose.yml instead:
#
#   docker compose up --build -d
#
# Or merge with backend stack only:
#
#   docker compose -f backend/docker-compose.yml -f frontend/docker-compose.frontend.yml up --build -d
#
# UI:  http://localhost:8081
# API: http://localhost:8080

services:
  frontend:
    build:
      # Resolved from Back-End/ when using: docker compose -f Back-End/... -f Front-End/...
      context: ./smart-inventory-ui
      dockerfile: Dockerfile
    container_name: smartinventory-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    environment:
      # Browser-facing URL (host machine), not the internal Docker service name
      API_URL: "${API_URL:-http://localhost:8080/api}"
      APP_NAME: "${APP_NAME:-Smart Inventory}"
    depends_on:
      - api
    restart: unless-stopped
