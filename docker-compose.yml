# Full stack: SQL Server + API + Angular UI + POS database
#
#   docker compose up --build -d
#   .\scripts\start-all.ps1          # starts Docker + POS desktop app
#
# Web UI:  http://localhost:8081
# API:     http://localhost:8080
# POS:     WinForms desktop (launched via start-all.ps1)

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartinventory-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-RIS_2026}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartinventory-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-RIS_2026}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SmartInventoryDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-RIS_2026};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Issuer: SmartInventorySystem
      Jwt__Audience: SmartInventorySystem.Client
      Jwt__SecretKey: "${JWT_SECRET_KEY:-SmartInventorySystem_DockerSecretKey_Min32Chars!}"
      Jwt__ExpirationMinutes: "120"
      Cache__DefaultExpirationMinutes: "5"
      Cors__AllowedOrigins__0: "http://localhost:8081"
      Cors__AllowedOrigins__1: "http://localhost:5173"
      Cors__AllowedOrigins__2: "http://localhost:4200"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/smart-inventory-ui
      dockerfile: Dockerfile
    container_name: smartinventory-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    environment:
      API_URL: "${API_URL:-http://localhost:8080/api}"
      APP_NAME: "${APP_NAME:-Smart Inventory}"
    depends_on:
      - api
    restart: unless-stopped

  pos-db-init:
    build:
      context: ./POSDesktopSystem
      dockerfile: docker/Dockerfile.migrate
    container_name: pos-db-init
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=POSDesktopSystem;User Id=sa;Password=${MSSQL_SA_PASSWORD:-RIS_2026};TrustServerCertificate=True;Encrypt=False;"
      Database__Provider: "SqlServer"
      Database__AutoMigrate: "true"
      Database__SeedDefaultUsers: "true"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

volumes:
  sqldata:
